<!-- After your header section -->
<div class="flex bg-[#070a10]">

  <!-- SIDEBAR -->
  <aside class="w-64 flex-shrink-0 bg-[#0d1117] border-r border-[#1e2a38] p-6 flex flex-col gap-6">

  <!-- Material Filters -->
  <div class="flex flex-col gap-2">
    <span class="text-xs font-bold uppercase tracking-widest text-[#5a7090]">Material Filters</span>

    @for (category of categories; track category) {
      <button
        (click)="filterByCategory(category)"
        [ngClass]="{'bg-[#2e7dff]/10 text-[#2e7dff] font-semibold': selectedCategory === category}"
        class="flex items-center gap-2 text-left text-sm text-[#8a9ab0] rounded-lg transition-all duration-200 hover:bg-[#1e2a38] px-4 py-2">
        🖥️ {{ category }}
      </button>
    }
  </div>

  <!-- Availability -->
  <div class="flex flex-col gap-3">
    <span class="text-xs font-bold uppercase tracking-widest text-[#5a7090]">Availability</span>

    <label class="flex items-center gap-2 text-sm text-[#8a9ab0] cursor-pointer">
      <input type="checkbox" class="w-4 h-4 accent-[#2e7dff]" />
      In Stock
    </label>

    <label class="flex items-center gap-2 text-sm text-[#8a9ab0] cursor-pointer">
      <input type="checkbox" class="w-4 h-4 accent-[#2e7dff]" />
      Pre-order
    </label>
  </div>

</aside>

  <!-- MAIN -->
  <main class="flex-1 p-8 flex flex-col gap-6">
    <!-- Header Section -->
    <h4 class="gap-4 text-4xl font-black text-white">Product Catalog</h4>
    <span class="text-m text-[#8a9ab0]">Advanced high-performance footwear engineering components.</span>
    Main content here
  </main>

</div>
